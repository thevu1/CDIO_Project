<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đặt lại mật khẩu - HealthQuest</title>
    <link rel="stylesheet" href="/static/css/login.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HealthQuest">
</head>
<body class="app-preview-body">
    <div class="mobile-preview">
        <div class="mobile-screen">
            <div class="app-top">
                <div class="app-logo">💚</div>
                <div>
                    <h1>HealthQuest</h1>
                    <p>Sống khỏe theo cách hiện đại</p>
                </div>
            </div>

            <div class="hero-card">
                <span class="chip">Reset password</span>
                <h2>Đặt lại mật khẩu</h2>
                <p>Nhập mật khẩu mới để bảo vệ tài khoản và tiếp tục sử dụng ứng dụng.</p>
            </div>

            <form class="mobile-form" onsubmit="resetPassword(event)">
                <div class="mobile-input-group">
                    <label>Mật khẩu mới</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Nhập mật khẩu mới" required>
                </div>

                <div class="mobile-input-group">
                    <label>Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                </div>

                <div id="message" style="margin: 6px 0 14px; font-size: 14px;"></div>

                <button type="submit" class="app-btn">Cập nhật mật khẩu</button>
            </form>

            <div class="info-cards">
                <div class="info-card">
                    <span>🛡️</span>
                    <div>
                        <strong>An toàn hơn</strong>
                        <p>Hãy chọn mật khẩu đủ mạnh và dễ nhớ với bạn</p>
                    </div>
                </div>

                <div class="info-card">
                    <span>🚀</span>
                    <div>
                        <strong>Sẵn sàng</strong>
                        <p>Sau khi cập nhật, bạn có thể đăng nhập lại ngay</p>
                    </div>
                </div>
            </div>

            <p class="mobile-switch">
                Muốn quay lại?
                <a href="/login">Đăng nhập</a>
            </p>
        </div>
    </div>

    <script>
        async function resetPassword(event) {
            event.preventDefault();

            const email = localStorage.getItem("resetEmail");
            const newPassword = document.getElementById("newPassword").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();
            const message = document.getElementById("message");

            message.textContent = "";

            if (!email) {
                message.style.color = "red";
                message.textContent = "Không tìm thấy email cần đặt lại mật khẩu.";
                return;
            }

            if (!newPassword || !confirmPassword) {
                message.style.color = "red";
                message.textContent = "Vui lòng nhập đầy đủ thông tin.";
                return;
            }

            if (newPassword.length < 6) {
                message.style.color = "red";
                message.textContent = "Mật khẩu phải có ít nhất 6 ký tự.";
                return;
            }

            if (newPassword !== confirmPassword) {
                message.style.color = "red";
                message.textContent = "Mật khẩu xác nhận không khớp.";
                return;
            }

            try {
                const res = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    message.style.color = "green";
                    message.textContent = data.message || "Đặt lại mật khẩu thành công.";
                    localStorage.removeItem("resetEmail");

                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 1500);
                } else {
                    message.style.color = "red";
                    message.textContent = data.message || "Không thể cập nhật mật khẩu.";
                }
            } catch (error) {
                message.style.color = "red";
                message.textContent = "Không thể kết nối đến server.";
            }
        }
    </script>
</body>
</html>
