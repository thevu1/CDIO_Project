<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HealthQuest</title>
    <link rel="stylesheet" href="./static/style.css">
</head>
<body class="app-preview-body">
    <div class="mobile-preview">
        <div class="mobile-screen">
            <div class="app-top">
                <div class="app-logo">💚</div>
                <div>
                    <h1>HealthQuest</h1>
                    <p>Sống khỏe theo cách hiện đại</p>
                </div>
            </div>

            <div class="hero-card">
                <span class="chip">Welcome back</span>
                <h2>Đăng nhập</h2>
                <p>Tiếp tục hành trình xây dựng thói quen sống lành mạnh mỗi ngày.</p>
            </div>


            <form action="/login" method="POST" class="mobile-form">
                <div class="mobile-input-group">
                    <label>Email / Username</label>
                    <input type="text" name="email" placeholder="Email hoặc tên đăng nhập" required>
                </div>

                <div class="mobile-input-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
            <div id="error-message" style="color:red; margin-bottom:10px;"></div>   


                <button type="submit" class="app-btn">Đăng nhập</button>
            </form>

            <div class="info-cards">
                <div class="info-card">
                    <span>🔥</span>
                    <div>
                        <strong>7 ngày streak</strong>
                        <p>Duy trì đều đặn mỗi ngày</p>
                    </div>
                </div>

                <div class="info-card">
                    <span>🎯</span>
                    <div>
                        <strong>Focus mode</strong>
                        <p>Tăng hiệu quả học tập và làm việc</p>
                    </div>
                </div>
            </div>

            <p class="mobile-switch">
                Chưa có tài khoản?
                <a href="/register">Đăng ký ngay</a>
            </p>
        </div>
    </div>
    <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    const msg = document.getElementById("error-message");

    if (error === "notfound") {
        msg.innerText = "Sai Tài Khoản Hoặc Mật Khẩu!";
    }

    if (error === "wrongpass") {
        msg.innerText = "Sai mật khẩu!";
    }
</script>
</body>
</html>
