<form action="/setup-profile" method="POST" class="mobile-form">
    <h2>Hoàn thiện hồ sơ</h2>

    <input name="nickname" placeholder="Biệt danh" required>
    <input type="date" name="birthdate" required>
    <input name="city" placeholder="Thành phố" required>
    <input name="phone_number" placeholder="Số điện thoại" required>

    <button type="submit">Hoàn tất</button>
</form>
