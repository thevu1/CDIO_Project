<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HealthQuest</title>
    <link rel="stylesheet" href="./static/style.css">
</head>
<body class="app-preview-body">
    <div class="mobile-preview">
        <div class="mobile-screen">
            <div class="app-top">
                <div class="app-logo">🌿</div>
                <div>
                    <h1>HealthQuest</h1>
                    <p>Khởi đầu hành trình sống khỏe</p>
                </div>
            </div>
            <div class="hero-card">
                <span class="chip">Create account</span>
                <h2>Đăng ký</h2>
                <p>Tạo tài khoản để bắt đầu theo dõi thói quen mỗi ngày.</p>
            </div>
            <form id="register-form" class="mobile-form">
                <div class="mobile-input-group">
                    <label>Họ và tên</label>
                    <input type="text" name="name" placeholder="Nhập họ và tên" required>
                </div>
                <div class="mobile-input-group">
            <label>Tên đăng nhập</label>
                <input type="text" name="username" placeholder="Nhập username" required>
            </div>

                <div class="mobile-input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="mobile-input-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <div id="message" style="margin-bottom:10px;"></div>
                <button id="register-btn" type="submit" class="app-btn">Đăng ký</button>
            </form>

            <p class="mobile-switch">
                Đã có tài khoản?
                <a href="/login">Đăng nhập</a>
            </p>
        </div>
    </div>
    <script src="/static/js/register.js" defer></script>
    <script>
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);

            const res = await fetch("/register", {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            if (data.status === "success") {
                alert("Đã gửi email xác minh!");
            }

            if (data.status === "exists_unverified") {
                alert("Email chưa xác minh, hãy resend!");
            }

            if (data.status === "exists") {
                alert("Email đã tồn tại!");
            }
        });
    </script>
</body>
</html>
