<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HealthQuest</title>
    <link rel="stylesheet" href="./static/style.css">
</head>
<body class="app-preview-body">
    <div class="mobile-preview">
        <div class="mobile-screen">
            <div class="app-top">
                <div class="app-logo">🌿</div>
                <div>
                    <h1>HealthQuest</h1>
                    <p>Khởi đầu hành trình sống khỏe</p>
                </div>
            </div>

            <div class="hero-card">
                <span class="chip">Create account</span>
                <h2>Đăng ký</h2>
                <p>Tạo tài khoản để bắt đầu theo dõi thói quen mỗi ngày.</p>
            </div>

            <form action="/register" method="POST" class="mobile-form">
                <div class="mobile-input-group">
                    <label>Họ và tên</label>
                    <input type="text" name="name" placeholder="Nhập họ và tên" required>
                </div>
                <div class="mobile-input-group">
            <label>Tên đăng nhập</label>
                <input type="text" name="username" placeholder="Nhập username" required>
            </div>

                <div class="mobile-input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="mobile-input-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>

                <button type="submit" class="app-btn">Đăng ký</button>
            </form>

            <p class="mobile-switch">
                Đã có tài khoản?
                <a href="/login">Đăng nhập</a>
            </p>
        </div>
    </div>
</body>
</html>
