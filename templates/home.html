<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthQuest</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="app-preview-body">
    <div class="mobile-preview">
        <div class="mobile-screen app-home">
            <div class="home-top">
                <div>
                    <p class="hello">Good morning 👋</p>
                    <h1>HealthQuest</h1>
                </div>
                <a href="/logout" class="logout-mini">Thoát</a>
            </div>

            <div class="score-card">
                <p>Tiến độ hôm nay</p>
                <h2>78%</h2>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:78%;"></div>
                </div>
            </div>

            <div class="section-title">
                <h3>Nhiệm vụ hôm nay</h3>
            </div>

            <div class="task-list-mobile">
                <div class="task-card-mobile">
                    <div class="task-left">
                        <span>🚶</span>
                        <div>
                            <strong>Đi bộ</strong>
                            <p>Mục tiêu 6000 bước</p>
                        </div>
                    </div>
                    <span class="task-badge">75%</span>
                </div>

                <div class="task-card-mobile">
                    <div class="task-left">
                        <span>😴</span>
                        <div>
                            <strong>Ngủ đúng giờ</strong>
                            <p>Trước 23:00</p>
                        </div>
                    </div>
                    <span class="task-badge">Chưa</span>
                </div>

                <div class="task-card-mobile">
                    <div class="task-left">
                        <span>📵</span>
                        <div>
                            <strong>Giảm screen time</strong>
                            <p>Dưới 4 giờ</p>
                        </div>
                    </div>
                    <span class="task-badge">Tốt</span>
                </div>

                <div class="task-card-mobile">
                    <div class="task-left">
                        <span>🎯</span>
                        <div>
                            <strong>Focus session</strong>
                            <p>45 phút</p>
                        </div>
                    </div>
                    <span class="task-badge">1/2</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
