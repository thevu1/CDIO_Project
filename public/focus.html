<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="stylesheet" href="/css/focus.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <title>Chế độ Tập trung</title>
</head>

<body>
    <div class="container">

        <div class="header" style="background:#2e7d32">

            <h2>Chế độ Tập trung</h2>

        </div>


        <div class="grid">

            <div class="card">

                <h3>Trên màn hình</h3>

                <button class="btn" onclick="startFocus()">Bắt đầu</button>

            </div>


            <div class="card">

                <h3>Ngoài màn hình</h3>

                <button class="btn">Bắt đầu</button>

            </div>

        </div>


        <div class="grid">

            <div class="card">
                <h3>Phiên hoàn thành</h3>
                <p id="session">0</p>
            </div>

            <div class="card">
                <h3>Tổng thời gian</h3>
                <p>0 phút</p>
            </div>

        </div>
        <div class="bottom-nav">

            <a href="/walk">
                🚶<br>Đi bộ
            </a>

            <a href="/sleep">
                🌙<br>Giấc ngủ
            </a>

            <a href="/">
                🏠<br>Trang chủ
            </a>

            <a href="/screen">
                📱<br>Màn hình
            </a>

            <a href="/focus">
                🎯<br>Tập trung
            </a>

    </div>
    <script src="/js/app.js"></script>

       
    <script>

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js");
        }

        let deferredPrompt;

        window.addEventListener("beforeinstallprompt", (e) => {

        e.preventDefault();
        deferredPrompt = e;

        const installBtn = document.createElement("button");
        installBtn.innerText = "📲 Cài đặt HealthQuest";
        installBtn.style.position = "fixed";
        installBtn.style.bottom = "80px";
        installBtn.style.left = "50%";
        installBtn.style.transform = "translateX(-50%)";
        installBtn.style.padding = "10px 20px";
        installBtn.style.borderRadius = "10px";
        installBtn.style.border = "none";
        installBtn.style.background = "#4CAF50";
        installBtn.style.color = "white";

        document.body.appendChild(installBtn);

        installBtn.addEventListener("click", () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
            installBtn.remove();
            deferredPrompt = null;
            });
        });

    });

    </script>
</body>

</html>
