<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="stylesheet" href="/css/sleep.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <title>Giấc ngủ</title>
</head>

<body>
    <div class="container">

        <div class="header" style="background:#8e24aa">

            <h2>Sẵn sàng ngủ</h2>

            <div class="card">

                <h1>22:30</h1>

                <p>Giờ ngủ mục tiêu</p>

            </div>

        </div>


        <div class="card">

            <p>Chưa có dữ liệu giấc ngủ hôm nay</p>

            <button class="btn">Ghi nhận giấc ngủ</button>

        </div>

        <div class="reminder-card">

            <div class="reminder-left">

                <div class="reminder-icon">
                    🔔
                </div>

                <div>

                    <h3>Nhắc nhở</h3>
                    <p>Cảnh báo lúc 22:00 (30 phút trước)</p>

                </div>

            </div>

            <div class="toggle"></div>

        </div>

        <div class="card">

            <h3>Lịch sử 7 ngày</h3>

            <p>Chưa có dữ liệu</p>

        </div>
        <div class="bottom-nav">

            <a href="/walk">
                🚶<br>Đi bộ
            </a>

            <a href="/sleep">
                🌙<br>Giấc ngủ
            </a>

            <a href="/">
                🏠<br>Trang chủ
            </a>

            <a href="/screen">
                📱<br>Màn hình
            </a>

            <a href="/focus">
                🎯<br>Tập trung
            </a>

        </div>
    </div>
    <script src="/js/app.js"></script>
    <script>

            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("/service-worker.js");
            }

            let deferredPrompt;

            window.addEventListener("beforeinstallprompt", (e) => {

            e.preventDefault();
            deferredPrompt = e;

            const installBtn = document.createElement("button");
            installBtn.innerText = "📲 Cài đặt HealthQuest";
            installBtn.style.position = "fixed";
            installBtn.style.bottom = "80px";
            installBtn.style.left = "50%";
            installBtn.style.transform = "translateX(-50%)";
            installBtn.style.padding = "10px 20px";
            installBtn.style.borderRadius = "10px";
            installBtn.style.border = "none";
            installBtn.style.background = "#4CAF50";
            installBtn.style.color = "white";

            document.body.appendChild(installBtn);

            installBtn.addEventListener("click", () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                installBtn.remove();
                deferredPrompt = null;
                });
            });

        });

        </script>
</body>

</html>
