    </div>

        <h3>Mục tiêu hằng ngày</h3>
        <p>5 km mỗi ngày</p>
    </div>

        <div class="card">

        </div>

        <div class="card">
            <h3>Tổng số ngày</h3>

        </div>

    </div>


    <button class="btn">+ Thêm khoảng cách thủ công</button>
