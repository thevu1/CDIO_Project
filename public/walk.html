<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/walk.css">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <title>Đi bộ & Vận động</title>
</head>
<body>
    <div class="container">

    <div class="header" style="background:#2962ff">

        <h2>Đi bộ & Vận động</h2>

        <div class="card">
            <h3>Hôm nay</h3>
            <h1>0.0 km / 5 km</h1>

            <div class="progress">
                <div class="progress-bar" style="width:0%"></div>
            </div>

        </div>

    </div>


    <div class="card">
        <h3>Mục tiêu hằng ngày</h3>
        <p>5 km mỗi ngày</p>
    </div>


    <div class="grid">

        <div class="card">
            <h3>Trung bình 7 ngày</h3>
            <p>0.0 km</p>
        </div>

        <div class="card">
            <h3>Tổng số ngày</h3>
            <p>0</p>
        </div>

    </div>


    <button class="btn">+ Thêm khoảng cách thủ công</button>

    <div class="bottom-nav">

        <a href="/walk">
            🚶<br>Đi bộ
        </a>

        <a href="/sleep">
            🌙<br>Giấc ngủ
        </a>

        <a href ="/">
            🏠<br>Trang chủ
        </a>

        <a href="/screen">
            📱<br>Màn hình
        </a>

        <a href="/focus">
            🎯<br>Tập trung
        </a>

    </div>
    <script src="/js/app.js"></script>
    
</div>
<script>

            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("/service-worker.js");
            }

            let deferredPrompt;

            window.addEventListener("beforeinstallprompt", (e) => {

            e.preventDefault();
            deferredPrompt = e;

            const installBtn = document.createElement("button");
            installBtn.innerText = "📲 Cài đặt HealthQuest";
            installBtn.style.position = "fixed";
            installBtn.style.bottom = "80px";
            installBtn.style.left = "50%";
            installBtn.style.transform = "translateX(-50%)";
            installBtn.style.padding = "10px 20px";
            installBtn.style.borderRadius = "10px";
            installBtn.style.border = "none";
            installBtn.style.background = "#4CAF50";
            installBtn.style.color = "white";

            document.body.appendChild(installBtn);

            installBtn.addEventListener("click", () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                installBtn.remove();
                deferredPrompt = null;
                });
            });

        });

        </script>
</body>
</html>
