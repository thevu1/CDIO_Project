<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://accounts.google.com/gsi/client"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./static/css/walk.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HealthQuest">

    <title>Đi bộ & Vận động</title>
</head>
<body>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="/js/google-fit-config.js"></script>
    <script src="/js/google-fit.js"></script>
    
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="back-btn">
                <a href="/index"><i class="fas fa-chevron-left"></i></a>
            </div>
            <h2>Đi bộ &amp; Vận động 🚶</h2>
        </div>

        <!-- HERO CARD -->
        <div class="hero-card">
            <div class="hero-label">Hôm nay</div>
            <div class="hero-main-row">
                <div>
                    <div style="display:flex;align-items:baseline;gap:4px">
                        <span class="hero-km" id="kmDisplay">5.0</span>
                        <span class="hero-km-unit">km</span>
                    </div>
                    <div class="hero-km-sub" id="kmSub">5 km / 5 km</div>
                </div>
                <div class="circle-wrap">
                    <svg width="72" height="72" viewBox="0 0 72 72">
                        <circle class="circle-bg" cx="36" cy="36" r="29" />
                        <circle class="circle-fill" id="circleArc" cx="36" cy="36" r="29" />
                    </svg>
                    <div class="circle-text">
                        <span class="big-pct" id="pctDisplay">100</span>
                        <span class="sm-pct">%</span>
                    </div>
                </div>
            </div>

            <div class="hero-bar-bg">
                <div class="hero-bar-fill" id="heroBar" style="width:100%"></div>
            </div>

            <!-- ✅ Số bước ở giữa, sau thanh progress -->
            <div class="steps-row">
                <div class="steps-icon">👟</div>
                <div class="steps-info">
                    <div class="steps-label">Số bước hôm nay</div>
                    <div class="steps-value" id="stepsDisplay">0</div>
                </div>
            </div>

            <div class="congrats-banner">
                <i class="fas fa-chart-line"></i> 🎉 Chúc mừng! Bạn đã đạt mục tiêu hôm nay!
            </div>

            <div class="mission-badge" onclick="claimXP()">
                <div class="mission-left">
                    <i class="fas fa-check-circle"></i>
                    <span id="missionText">Nhiệm vụ hoàn thành</span>
                </div>
                <div class="xp-chip">+50 XP</div>
            </div>
        </div>

        <!-- GOAL -->
        <div class="section-label">Mục tiêu</div>
        <div class="goal-card">
            <div class="goal-top">
                <div class="goal-top-left">
                    <div class="goal-icon">🎯</div>
                    <div>
                        <div class="goal-info-title">Mục tiêu hàng ngày</div>
                        <div class="goal-info-sub">Có thể chỉnh trong cài đặt</div>
                    </div>
                </div>
                <div class="edit-btn" onclick="editGoal()"><i class="fas fa-pen"></i></div>
            </div>
            <div class="goal-value">
                <span id="goalVal">5</span>
                <span class="unit">km mỗi ngày</span>
            </div>
        </div>

        <!-- STATS -->
        <div class="section-label">Thống kê</div>
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-top"><i class="fas fa-chart-line"></i> TB 7 ngày</div>
                <div class="stat-val" id="avg7d">5.0 <span class="unit">km</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-top"><i class="fas fa-calendar-check"></i> Tổng số ngày</div>
                <div class="stat-val orange" id="totalDays">1 <span class="unit">ngày</span></div>
            </div>
        </div>

        <!-- CHART -->
        <div class="section-label">Biểu đồ</div>
        <div class="chart-card">
            <div class="chart-header"><span>📈</span> Lịch sử 7 ngày</div>
            <div class="chart-area">
                <div class="chart-svg-wrap">
                    <svg id="barChart" viewBox="0 0 340 160" preserveAspectRatio="xMidYMid meet"></svg>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div id="bottomNavContainer"></div>
        <script src="./static/js/loadComponent.js"></script>

    </div>

    <script src="/js/walk.js"></script>
</body>

</html>
