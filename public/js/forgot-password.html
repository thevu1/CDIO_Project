<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - HealthQuest</title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="app-preview-body">
    <div class="mobile-preview">
        <div class="mobile-screen">
            <div class="app-top">
                <div class="app-logo">💚</div>
                <div>
                    <h1>HealthQuest</h1>
                    <p>Sống khỏe theo cách hiện đại</p>
                </div>
            </div>

            <div class="hero-card">
                <span class="chip">Password recovery</span>
                <h2>Quên mật khẩu</h2>
                <p>Nhập email đã đăng ký để tiếp tục quá trình đặt lại mật khẩu.</p>
            </div>

            <form class="mobile-form" onsubmit="checkEmail(event)">
                <div class="mobile-input-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div id="message" style="margin: 6px 0 14px; font-size: 14px;"></div>

                <button type="submit" class="app-btn">Tiếp tục</button>
            </form>

            <div class="info-cards">
                <div class="info-card">
                    <span>🔐</span>
                    <div>
                        <strong>Bảo mật</strong>
                        <p>Xác minh đúng email để khôi phục tài khoản</p>
                    </div>
                </div>

                <div class="info-card">
                    <span>💡</span>
                    <div>
                        <strong>Nhanh chóng</strong>
                        <p>Đặt lại mật khẩu và quay lại hành trình của bạn</p>
                    </div>
                </div>
            </div>

            <p class="mobile-switch">
                
                <a href="/login">Quay lại đăng nhập</a>
            </p>
        </div>
    </div>

    <script>
        async function checkEmail(event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const message = document.getElementById("message");

            message.textContent = "";

            if (!email) {
                message.style.color = "red";
                message.textContent = "Vui lòng nhập email.";
                return;
            }

            try {
                const res = await fetch("/api/auth/check-email", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem("resetEmail", email);
                    window.location.href = "/reset-password";
                } else {
                    message.style.color = "red";
                    message.textContent = data.message || "Email không hợp lệ.";
                }
            } catch (error) {
                message.style.color = "red";
                message.textContent = "Không thể kết nối đến server.";
            }
        }
    </script>
</body>
</html>
