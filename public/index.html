<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HealthQuest</title>

    <link rel="stylesheet" href="/css/main.css">


    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
</head>

<body>


    <div class="app">

        <!-- HEADER -->

        <header>

            <div class="main-header" style="background-color: chocolate;">

                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">

                <div class="settings">⚙️</div>

                <div class="header-content">

                    <div class="username">Tên Người dùng</div>

                    <div class="level-row">
                        <span class="level-text">Level</span>
                        <span class="level-badge">0</span>

                        <div class="xp-bar">
                            <div class="xp-fill" style="width: 0%"></div>
                        </div>

                        <span class="xp-text">0 / 500 XP</span>
                    </div>

                    <div class="streak-row">
                        <div class="streak-box">🔥 7</div>

                        <div class="days">
                            <span class="day active">T2</span>
                            <span class="day active">T3</span>
                            <span class="day active">T4</span>
                            <span class="day active">T5</span>
                            <span class="day active">T6</span>
                            <span class="day active">T7</span>
                            <span class="day">CN</span>
                        </div>
                    </div>

                </div>

            </div>


        </header>


        <div class="big-card">

            <div class="leaderboard-title">🏆 Leaderboard</div>

            <div id="leaderboard"></div>

        </div>

        <!-- TASK LIST CARD -->

        <div class="big-card">

            <div class="task-title">📋 Nhiệm vụ hôm nay</div>

            <div class="task-list">

                <!-- WALK -->

                <div class="task-item">

                    <div class="task-top">

                        <div class="task-header">

                            <span class="task-name">Đi bộ 🚶</span>

                            <span class="percent blue">0%</span>

                        </div>

                    </div>

                    <div class="progress">
                        <div class="progress-bar" style="width:0%"></div>
                    </div>

                </div>
                <!-- SLEEP -->

                <div class="task-item">

                    <div class="task-top">

                        <div>
                            <div class="task-name">Giấc ngủ</div>
                            <div class="task-progress">Chưa ghi nhận</div>
                        </div>

                        <div>🌙</div>

                    </div>

                </div>

                <!-- SCREEN TIME -->

                <div class="task-item">

                    <div class="task-top">

                        <div class="task-header">

                            <span class="task-name">Thời gian màn hình 📱</span>

                            <span class="percent orange">0%</span>

                        </div>

                    </div>

                    <div class="progress">
                        <div class="progress-bar" style="width:0%"></div>
                    </div>

                </div>

                <!-- FOCUS -->

                <div class="task-item">

                    <div class="task-top">

                        <div>
                            <div class="task-name">Tập trung</div>
                            <div class="task-progress">0 phút</div>
                        </div>

                        <div>🎯</div>

                    </div>

                </div>

            </div>

        </div>

        <!-- MOBILE NAV -->

        <div class="bottom-nav">

            <a href="/walk">
                🚶<br>Đi bộ
            </a>

            <a href="/sleep">
                🌙<br>Giấc ngủ
            </a>

            <a href="/" class="active home-active">
                🏠<br>Trang chủ
            </a>

            <a href="/screen">
                📱<br>Màn hình
            </a>

            <a href="/focus">
                🎯<br>Tập trung
            </a>

        </div>


        
        
        <script src="/js/app.js"></script>

        <script>
            if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js");
        }
        </script>
    <script>

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js");
        }

        let deferredPrompt;

        window.addEventListener("beforeinstallprompt", (e) => {

        e.preventDefault();
        deferredPrompt = e;

        const installBtn = document.createElement("button");
        installBtn.innerText = "📲 Cài đặt HealthQuest";
        installBtn.style.position = "fixed";
        installBtn.style.bottom = "80px";
        installBtn.style.left = "50%";
        installBtn.style.transform = "translateX(-50%)";
        installBtn.style.padding = "10px 20px";
        installBtn.style.borderRadius = "10px";
        installBtn.style.border = "none";
        installBtn.style.background = "#4CAF50";
        installBtn.style.color = "white";

        document.body.appendChild(installBtn);

        installBtn.addEventListener("click", () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
            installBtn.remove();
            deferredPrompt = null;
            });
        });

        });

    </script>
</body>
</html>
</body>

</html>
