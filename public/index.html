<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Quest</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
</head>

<body>
    <div class="phone">
        <!-- ─── Scroll wrapper ─── -->
        <div class="scroll">

            <!-- Top bar -->
            <div class="topbar">
                <div class="avatar">WA</div>
                <div class="gear-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c4c0e0" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </div>
            </div>

            <!-- Profile -->
            <div class="profile">
                <h1>Warrior</h1>
                <div class="level-row">
                    <span class="level-badge">Level 1</span>
                    <div class="xp-bar-wrap">
                        <div class="xp-bar"></div>
                    </div>
                    <span class="xp-text">30 / 100 XP</span>
                </div>
            </div>

            <!-- Day tabs -->
            <div class="day-tabs">
                <div class="day-pill fire">🔥 0</div>
                <div class="day-pill">T2</div>
                <div class="day-pill">T3</div>
                <div class="day-pill">T4</div>
                <div class="day-pill">T5</div>
                <div class="day-pill">T6</div>
                <div class="day-pill">T7</div>
                <div class="day-pill">CN</div>
            </div>

            <!-- Leaderboard card -->
            <div class="card">
                <div class="section-title">🏆 Bảng xếp hạng</div>

                <!-- Danh sách — sẽ được render bởi JS -->
                <div id="leaderboardList">

                    <!-- Skeleton placeholder hiển thị trong lúc đang tải -->
                    <div class="lb-row" id="skel-1">
                        <div class="lb-rank" style="opacity:.3">—</div>
                        <div class="lb-avatar ng" style="opacity:.3"></div>
                        <div class="lb-info">
                            <div class="lb-name"
                                style="background:rgba(255,255,255,.08);border-radius:6px;height:13px;width:55%;"></div>
                            <div class="lb-sub"
                                style="background:rgba(255,255,255,.05);border-radius:4px;height:10px;width:38%;margin-top:5px;">
                            </div>
                        </div>
                        <div class="lb-medal" style="opacity:.15">🏅</div>
                    </div>
                    <div class="lb-row" id="skel-2">
                        <div class="lb-rank" style="opacity:.3">—</div>
                        <div class="lb-avatar ng" style="opacity:.3"></div>
                        <div class="lb-info">
                            <div class="lb-name"
                                style="background:rgba(255,255,255,.08);border-radius:6px;height:13px;width:50%;"></div>
                            <div class="lb-sub"
                                style="background:rgba(255,255,255,.05);border-radius:4px;height:10px;width:35%;margin-top:5px;">
                            </div>
                        </div>
                        <div class="lb-medal" style="opacity:.15">🏅</div>
                    </div>
                    <div class="lb-row" id="skel-3">
                        <div class="lb-rank" style="opacity:.3">—</div>
                        <div class="lb-avatar wa" style="opacity:.3"></div>
                        <div class="lb-info">
                            <div class="lb-name"
                                style="background:rgba(255,255,255,.08);border-radius:6px;height:13px;width:42%;"></div>
                            <div class="lb-sub"
                                style="background:rgba(255,255,255,.05);border-radius:4px;height:10px;width:30%;margin-top:5px;">
                            </div>
                        </div>
                        <div class="lb-medal" style="opacity:.15">🏅</div>
                    </div>

                </div>
            </div>

            <!-- Tasks card -->
            <div class="card">
                <div class="section-title">📋 Nhiệm vụ hôm nay</div>

                <div class="task-row">
                    <div class="task-header">
                        <span class="task-name">Đi bộ 🚶</span>
                        <span class="task-val zero">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width:0%"></div>
                    </div>
                </div>

                <div class="task-row">
                    <div class="task-header">
                        <span class="task-name">Giấc ngủ 🌙</span>
                    </div>
                    <div class="task-sub">Chưa ghi nhận</div>
                </div>

                <div class="task-row">
                    <div class="task-header">
                        <span class="task-name">Thời gian màn hình 📱</span>
                        <span class="task-val zero">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width:0%"></div>
                    </div>
                </div>

                <div class="task-row">
                    <div class="task-header">
                        <span class="task-name">Tập trung 🎯</span>
                    </div>
                    <div class="task-sub">0 phút</div>
                </div>
            </div>

        </div><!-- /scroll -->

        <div class="bottom-nav">
            <a href="/walk">
                <div class="nav-icon">🚶</div>
                Đi bộ
            </a>
            <a href="/sleep">
                <div class="nav-icon">🌙</div>
                Giấc ngủ
            </a>
            <a href="/index" class="active">
                <div class="nav-icon">🏠</div>
                Trang chủ
            </a>
            <a href="/screen">
                <div class="nav-icon">📱</div>
                Màn hình
            </a>
            <a href="/focus">
                <div class="nav-icon">🎯</div>
                Tập trung
            </a>

        </div>

        <script src="/js/app.js">
            // Animate progress bars on load
            window.addEventListener('load', () => {
                document.querySelectorAll('.progress-fill').forEach(el => {
                    const target = el.style.width;
                    el.style.width = '0%';
                    requestAnimationFrame(() => {
                        setTimeout(() => { el.style.width = target; }, 100);
                    });
                });
            });

            // Nav item click
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                });
            });
        </script>
</body>

</html>
